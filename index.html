<!DOCTYPE html>
<html lang="en">

  <head>
    <title>Network</title>

    <!--  Import scripts -->
    <script
      type="text/javascript"
      src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"
    ></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- Styles -->
    <style type="text/css">
    
      :root { /* Core document vars */
        --color-lowest: 173,216,230;
        --color-low: 0,129,194;
        --color-med: 0,200,165;
        --color-high: 235,170,0;
        --color-highest:224, 42, 42;
      }

      #network_body {
        width: 80vw;
        height: 100vh;
        border-right: 2px solid black;
      }

      #graph {
        width: 80vw;
        height: 100vh;
      }

      #color {
        position: fixed;
        right: 9vw;
        top: clamp(380px, 55vh, 55vh);
      }

      #color-scheme {
        width: 30px;
        height: 300px;
        background: linear-gradient( to top,
          rgb(var(--color-lowest)) 0%,
          rgb(var(--color-low)) 33%,
          rgb(var(--color-med)) 66%,
          rgb(var(--color-high)) 83%,
          rgb(var(--color-highest)) 100%
        );
        z-index:1;
      }

      #color-values {
        position: absolute;
        display: flex; 
        flex-direction: column;
        justify-content:space-between;
        width: 30px;
        height: 300px;
        right: 20px;
        bottom: 0px;
        color: cyan;
      }

      #Growth-rate {
        position: absolute;
        top: -30px;
        width: 90px;
        right: -30px;
        color: cyan;
      }

      .plus-icon {
        position: absolute;
        cursor: pointer;

        --horizontal-width: 24px;
        --horizontal-height: 4px;
        --vertical-width: 4px;
        --vertical-height: 24px;
      }

      .plus-icon::before,
      .plus-icon::after {
          content: "";
          position: absolute;
          background: #2563eb; /* modern blue */
          border-radius: 999px;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
      }

      /* Horizontal bar */
      .plus-icon::before {
        width: var(--horizontal-width);
        height: var(--horizontal-height);
      }

      /* Vertical bar */
      .plus-icon::after {
        width: var(--vertical-width);
        height: var(--vertical-height);
      }

      /* Minus state */
      .plus-icon.minus::after {
        display: none;
     }

      .cluster {
        border solid 1 black;
      }

      .net {
        width: 80vw;
        z-index: 1;
        position: relative;
      }

      .patInfo {
        position: absolute;
        width: 32vw;
        height: 80px;

        margin-left: 23vw;
        transform: translateY(-35px);
        z-index: -1;
        
        pointer-events: none;
        display: none;

        /* Styling */
        background: linear-gradient(
            180deg,
            #31353c 0%,
            #272a30 100%
        );

        color: #f3f4f6;

        padding: 16px 20px;

        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.06);

        box-shadow:
            0 12px 30px rgba(0,0,0,.35),
            inset 0 1px rgba(255,255,255,.03);

        font-family:
            Inter,
            "Segoe UI",
            system-ui,
            sans-serif;

        font-size: 14px;
        line-height: 1.5;

        backdrop-filter: blur(8px);
      }

      .network-info {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .network-stats {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        justify-content: center;
        justify-items: center;
        gap: 10px 40px;

        width: 100%;
        white-space: nowrap; 
        flex-wrap: nowrap; 
        top: -15px;
      }

      .selected.seq {
        grid-column: 1 / span 3;
        text-align: center;
        font-size: 10px;
      }

      .group.left.sup {
        grid-column: 2;
        text-align: center;
        transform: translateX(-65px);
      }

      .group.right.sup {
        grid-column: 3;
        text-align: center;
        transform: translateX(-75px);
      }

      .group.odds {
        grid-column: 1 / span 3;
        justify-self: center;
        white-space: nowrap;
        text-align: center;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .userPanel {
        width: 19vw; /* NOTE: Re-adjust if shifting the network width */
        height: 100vh;    /* full screen height */
        position: fixed;
        right: 0;
        top: 0;

        background: #24262b;
        color: #f3f4f6;
        padding: 18px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow:
            0 10px 30px rgba(0,0,0,.35),
            inset 0 1px rgba(255,255,255,.03);

        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .panelTitle {
        margin: 0 0 12px 0;
        font-size: 14px;
        font-weight: 600;
        color: #f0f0f0;
        letter-spacing: 0.5px;
      }

      .sectionLabel {
        margin: 14px 0 6px;
        font-size: 12px;
        color: #aaaaaa;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .optionRow {
        display: flex;
        align-items: center;
        width: 18vw;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .optionRow:hover {
        background: #3a3a3a;
      }

      .optionRow input {
        accent-color: #7aa2ff;
        transform: scale(1.05);
      }

      .dropdown {
        width: 100%;
        padding: 8px 10px;

        background: #3a3a3a;
        color: #e6e6e6;

        border: 1px solid #4a4a4a;
        border-radius: 8px;

        font-size: 13px;

        outline: none;
        cursor: pointer;

        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;

        transition: background 0.15s ease, border 0.15s ease;
      }

      .dropdown:hover {
        background: #444;
        border-color: #5a5a5a;
      }

      .dropdown:focus {
        border-color: #7aa2ff;
        box-shadow: 0 0 0 2px rgba(122, 162, 255, 0.2);
      }

      .menuSection {
        position: relative;
      }

      .menuSection::after {
        content: "▾";
        position: absolute;
        right: 12px;
        top: 34px;
        color: #aaa;
        pointer-events: none;
      }

      .cluster {
          border: 1px solid black;
          border-right: none;
          display: flex;
          flex-direction: column;
          width: fit-content;
      }

      .cluster-title {
        position: relative;
        top: 10px;
        left: 12px;

        font-size: 18px;
        font-weight: 700;
        color: #333;

        background: white;
        padding: 4px 10px;
        border-radius: 6px;
    }
    </style>
  </head>

  <!-- Page -->
  <body>
    <div id='graph'>
      <div id='network_body'></div> <!-- Network contained in this div (dynamic) -->
      
      <div class="userPanel">  <!-- Filters, sorting, stuff for the user to modify --->

        <h3 class="panelTitle">Options</h3>
        <label class="optionRow">
          <input type="checkbox" id="clustering" autocomplete="off">
          <span>Enable clustering</span>
        </label>

        <label class="optionRow">
          <input type="checkbox" id="compressing" autocomplete="off">
          <span>Enable tree branches</span>
        </label>

        <label class="optionRow">
          <input type="checkbox" id="contrasted-only" checked autocomplete="off">
          <span>Contrastive-only</span>
        </label>

        <div class="sectionLabel">Sorting</div>
        <label class="optionRow">
          <input type="radio" name="sorting" value="desc" checked="checked" autocomplete="off">
          <span>Descending</span>
        </label>

        <label class="optionRow">
          <input type="radio" name="sorting" value="asc" autocomplete="off">
          <span>Ascending</span>
        </label>

        <div class="menuSection">
          <div class="sectionLabel">Sort Method</div>
            <select id="sortMethod" class="dropdown" autocomplete="off">
              <option value="length" selected>Length / Default</option>
              <option value="frequency">SLE Frequency</option>
              <option value="odds_ratio">Odds Ratio</option>
              <option value="growth_rate">Growth Rate</option>
            </select>
          </div>
        </div>

        <!-- Button listensers --->
        <script type="module">
        import { SORT_TYPE, build_network } from './docs/network.js'

        // Assigning defaults for UI selections
        var sort_type = SORT_TYPE.LENGTH
        var desc = true; 
        var compress = false;
        var contrasted_only = true;
        var cluster = false;


        // Radio buttons: Sorting order
        document.querySelectorAll('input[name="sorting"]').forEach((radio) => {
            radio.addEventListener("change", function (e) {

                if (e.target.value === "asc") {
                  desc = false;
                }
                else {
                  desc = true;
                }

                // Sort in ascend or descending order
                build_network(sort_type, desc, compress, contrasted_only, cluster);
            });
        });


        // Drop down menu for sorting
        document.getElementById("sortMethod").addEventListener("change", function (e) {
            const value = e.target.value;

            if (value === "length") sort_type = SORT_TYPE.LENGTH;
            else if (value === "frequency") sort_type = SORT_TYPE.FREQ;
            else if (value === "odds_ratio") sort_type = SORT_TYPE.ODDS;
            else if (value === "growth_rate") sort_type = SORT_TYPE.GROWTH;

            build_network(sort_type, desc, compress, contrasted_only, cluster);
        });

        // Check box for clustering
        document.getElementById("clustering").addEventListener("change", function () {
            cluster = this.checked;
            build_network(sort_type, desc, compress, contrasted_only, cluster);
        });

        // Check box for compressed
        document.getElementById("compressing").addEventListener("change", function () {
            compress = this.checked;
            build_network(sort_type, desc, compress, contrasted_only, cluster);
        });

        // Check box for contrasted
        document.getElementById("contrasted-only").addEventListener("change", function () {
            contrasted_only = this.checked;
            build_network(sort_type, desc, compress, contrasted_only, cluster);
        });
        </script>

        <div id='color'>
          <div id='color-scheme'></div>
          <span id='Growth-rate'>Growth Rate</span>
          <div id='color-values'>
              <span>6+</span>
              <span>3</span>
              <span>2</span>
              <span>1</span>
          </div>
        </div>
    </div>
  </body>
</html>
